name: ObsidianJot
options:
  bundleIdPrefix: com.tgoodwin
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.2.0"

targets:
  ObsidianJot:
    type: application
    platform: macOS
    sources:
      - path: Sources
    resources:
      - path: Resources
        excludes:
          - Info.plist
    dependencies:
      - package: KeyboardShortcuts
    info:
      path: Resources/Info.plist
      properties:
        LSUIElement: true
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        NSHumanReadableCopyright: ""
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tgoodwin.ObsidianJot
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        ENABLE_HARDENED_RUNTIME: NO
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        SWIFT_VERSION: "5.9"
        COMBINE_HIDPI_IMAGES: YES
